<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AI Tomato Care - History</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}"
            rel="stylesheet"
        />
        <link
            href="{{ url_for('static', filename='vendor/bootstrap-icons/font/bootstrap-icons.min.css') }}"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/app.css') }}"
        />
        <style>
            .history-table {
                margin-bottom: 0;
                border-color: rgba(13, 148, 136, 0.22);
                overflow: hidden;
            }
            .history-table thead th {
                background: linear-gradient(
                    135deg,
                    rgba(187, 247, 208, 0.92),
                    rgba(254, 202, 202, 0.9)
                );
                color: var(--primary-dark);
                border-color: rgba(13, 148, 136, 0.2);
            }
            .history-table tbody tr {
                background: linear-gradient(
                    135deg,
                    rgba(236, 254, 255, 0.9),
                    rgba(254, 242, 242, 0.88)
                );
            }
            .history-table tbody tr:nth-child(even) {
                background: linear-gradient(
                    135deg,
                    rgba(224, 242, 254, 0.9),
                    rgba(220, 252, 231, 0.84)
                );
            }
            .history-table tbody tr:hover {
                background: linear-gradient(
                    135deg,
                    rgba(186, 230, 253, 0.98),
                    rgba(254, 226, 226, 0.95)
                );
            }
            .history-table th,
            .table th,
            .table td {
                vertical-align: middle;
                border-color: rgba(13, 148, 136, 0.2);
                background-color: transparent;
            }
            .history-table tbody img {
                border: 1px solid rgba(15, 118, 110, 0.25);
                box-shadow: 0 8px 16px rgba(15, 118, 110, 0.14);
                background: rgba(255, 255, 255, 0.8);
            }
        </style>
    </head>
    <body>
        <button
            class="sidebar-toggle"
            id="sidebarToggle"
            type="button"
            aria-label="Toggle sidebar"
        >
            <i class="bi bi-list"></i>
        </button>
        <div class="container-fluid">
            <div class="row">
                {% include 'partials/sidebar.html' %}
                <div class="main-panel p-5">
                    {% include 'partials/top_nav.html' %}
                    <div class="content-box">
                        <div
                            class="d-flex justify-content-between align-items-center mb-3"
                        >
                            <h2 class="fw-bold mb-0">
                                <i class="bi bi-clock-history me-2"></i>Your
                                Plant Health History - {{ current_user.name }}
                            </h2>
                            <button
                                class="btn btn-sm btn-outline-danger"
                                id="clearHistoryBtn"
                            >
                                <i class="bi bi-trash3 me-1"></i> Clear all
                                history
                            </button>
                        </div>
                        <div
                            class="alert alert-success py-2"
                            id="historySuccess"
                            style="display: none"
                        ></div>
                        <div
                            class="alert alert-danger py-2"
                            id="historyError"
                            style="display: none"
                        ></div>
                        <table
                            class="table table-bordered history-table rounded overflow-hidden"
                        >
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Image</th>
                                    <th>Diagnosis</th>
                                    <th>Confidence</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="historyBody">
                                <tr>
                                    <td colspan="5" class="text-center">
                                        Loading...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/app.js') }}"></script>
        <script>
            async function loadHistory() {
                const tbody = document.getElementById("historyBody");
                try {
                    const res = await fetch("{{ url_for('api_history') }}");
                    const data = await res.json();
                    if (!data.length) {
                        tbody.innerHTML =
                            '<tr><td colspan="5" class="text-center text-muted">No scans yet. Upload a leaf image on the Home page.</td></tr>';
                        return;
                    }
                    var uploadsBase =
                        "{{ url_for('uploaded_file', filename='') }}";
                    tbody.innerHTML = data
                        .map(function (s) {
                            var date = "-";
                            if (
                                window.aiTomato &&
                                window.aiTomato.toLocalDateTime
                            ) {
                                date = window.aiTomato.toLocalDateTime(
                                    s.created_at,
                                    "-",
                                );
                            }
                            var imgUrl = s.image_url
                                ? uploadsBase + s.image_url
                                : "";
                            return (
                                "<tr><td>" +
                                date +
                                '</td><td><img src="' +
                                imgUrl +
                                '" alt="Scan" class="rounded" style="max-height:50px" onerror="this.style.display=\'none\'"></td><td>' +
                                (s.label || "-") +
                                "</td><td>" +
                                ((s.confidence || 0) * 100).toFixed(2) +
                                '%</td><td><button class="btn btn-sm btn-outline-danger delete-scan-btn" data-scan-id="' +
                                s.scan_id +
                                '"><i class="bi bi-trash3"></i></button></td></tr>'
                            );
                        })
                        .join("");
                } catch (e) {
                    tbody.innerHTML =
                        '<tr><td colspan="5" class="text-center text-danger">Failed to load history.</td></tr>';
                }
            }

            (function init() {
                loadHistory();

                const tbody = document.getElementById("historyBody");
                const clearBtn = document.getElementById("clearHistoryBtn");
                const successBox = document.getElementById("historySuccess");
                const errorBox = document.getElementById("historyError");

                clearBtn.addEventListener("click", async function () {
                    successBox.style.display = "none";
                    errorBox.style.display = "none";

                    if (
                        !window.confirm(
                            "Clear all saved scan history for your account? This cannot be undone.",
                        )
                    ) {
                        return;
                    }

                    clearBtn.disabled = true;
                    const originalHtml = clearBtn.innerHTML;
                    clearBtn.innerHTML =
                        '<span class="spinner-border spinner-border-sm me-1"></span> Clearing...';

                    try {
                        const res = await fetch(
                            "{{ url_for('api_history_clear') }}",
                            {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({}),
                            },
                        );
                        const data = await res.json();
                        if (res.ok && data.success) {
                            successBox.textContent =
                                data.message || "History cleared.";
                            successBox.style.display = "block";
                            await loadHistory();
                        } else {
                            errorBox.textContent =
                                data.message || "Failed to clear history.";
                            errorBox.style.display = "block";
                        }
                    } catch (err) {
                        errorBox.textContent =
                            "Error clearing history. Please try again.";
                        errorBox.style.display = "block";
                    }

                    clearBtn.disabled = false;
                    clearBtn.innerHTML = originalHtml;
                });

                tbody.addEventListener("click", async function (event) {
                    const btn = event.target.closest(".delete-scan-btn");
                    if (!btn) return;
                    successBox.style.display = "none";
                    errorBox.style.display = "none";

                    const scanId = btn.getAttribute("data-scan-id");
                    if (!scanId) return;

                    if (
                        !window.confirm(
                            "Delete this scan? This action cannot be undone.",
                        )
                    ) {
                        return;
                    }

                    const original = btn.innerHTML;
                    btn.disabled = true;
                    btn.innerHTML =
                        '<span class="spinner-border spinner-border-sm"></span>';

                    try {
                        const res = await fetch(
                            "/api/history/" + scanId + "/delete",
                            {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({}),
                            },
                        );
                        const data = await res.json();
                        if (res.ok && data.success) {
                            successBox.textContent =
                                data.message || "Scan deleted.";
                            successBox.style.display = "block";
                            await loadHistory();
                        } else {
                            errorBox.textContent =
                                data.message || "Failed to delete scan.";
                            errorBox.style.display = "block";
                        }
                    } catch (err) {
                        errorBox.textContent =
                            "Error deleting scan. Please try again.";
                        errorBox.style.display = "block";
                    }

                    btn.disabled = false;
                    btn.innerHTML = original;
                });
            })();
        </script>
    </body>
</html>
