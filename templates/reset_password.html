<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AI Tomato Care - Reset Password</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}"
            rel="stylesheet"
        />
        <link
            href="{{ url_for('static', filename='vendor/bootstrap-icons/font/bootstrap-icons.min.css') }}"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/app.css') }}"
        />
    </head>
    <body>
        <button
            class="sidebar-toggle"
            id="sidebarToggle"
            type="button"
            aria-label="Toggle sidebar"
        >
            <i class="bi bi-list"></i>
        </button>
        <div class="container-fluid">
            <div class="row">
                {% include 'partials/sidebar.html' %}
                <div class="main-panel p-5">
                    {% include 'partials/top_nav.html' %}
                    <div class="card-wrap">
                        <h3 class="fw-bold mb-2">Set a new password</h3>
                        <p class="mb-3">
                            Choose a strong password you have not used before.
                        </p>
                        {% if error %}
                        <div class="alert alert-danger py-2">{{ error }}</div>
                        {% endif %} {% if success %}
                        <div class="alert alert-success py-2">
                            {{ success }}
                        </div>
                        {% endif %}
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    New password
                                </label>
                                <div class="input-group">
                                    <input
                                        type="password"
                                        name="password"
                                        class="form-control"
                                        placeholder="New password"
                                        minlength="8"
                                        autocomplete="new-password"
                                        required
                                    />
                                    <button
                                        class="btn btn-password-toggle password-toggle"
                                        type="button"
                                        aria-label="Show password"
                                    >
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <div class="form-text small">
                                    Minimum 8 characters.
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    Confirm password
                                </label>
                                <div class="input-group">
                                    <input
                                        type="password"
                                        name="confirm_password"
                                        class="form-control"
                                        placeholder="Confirm password"
                                        minlength="8"
                                        autocomplete="new-password"
                                        required
                                    />
                                    <button
                                        class="btn btn-password-toggle password-toggle"
                                        type="button"
                                        aria-label="Show password"
                                    >
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <button
                                type="submit"
                                class="btn btn-primary-custom"
                            >
                                <i class="bi bi-shield-lock-fill"></i>
                                Update password
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    </body>
</html>
