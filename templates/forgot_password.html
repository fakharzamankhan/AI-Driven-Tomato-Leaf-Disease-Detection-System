<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AI Tomato Care - Forgot Password</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}"
            rel="stylesheet"
        />
        <link
            href="{{ url_for('static', filename='vendor/bootstrap-icons/font/bootstrap-icons.min.css') }}"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/app.css') }}"
        />
    </head>
    <body>
        <button
            class="sidebar-toggle"
            id="sidebarToggle"
            type="button"
            aria-label="Toggle sidebar"
        >
            <i class="bi bi-list"></i>
        </button>
        <div class="container-fluid">
            <div class="row">
                {% include 'partials/sidebar.html' %}
                <div class="main-panel p-5">
                    {% include 'partials/top_nav.html' %}
                    <div class="card-wrap">
                        <h3 class="fw-bold mb-2">Reset your password</h3>
                        <p class="mb-3">
                            Enter your email and we will send you a reset link.
                        </p>
                        {% if success %}
                        <div class="alert alert-success py-2">
                            {{ success }}
                        </div>
                        {% endif %} {% if error %}
                        <div class="alert alert-danger py-2">{{ error }}</div>
                        {% endif %}
                        <form
                            id="forgotPasswordForm"
                            method="POST"
                            action="{{ url_for('forgot_password_page') }}"
                        >
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email</label>
                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    placeholder="your@email.com"
                                    required
                                />
                            </div>
                            <button
                                type="submit"
                                class="btn btn-primary-custom"
                                id="forgotSubmitBtn"
                            >
                                <i class="bi bi-envelope-arrow-right-fill"></i>
                                Send reset link
                            </button>
                        </form>
                        <div class="mt-3">
                            <a href="{{ url_for('login_page') }}" class="small">
                                Back to login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/app.js') }}"></script>
        <script>
            const forgotForm = document.getElementById("forgotPasswordForm");
            if (forgotForm) {
                forgotForm.addEventListener("submit", function () {
                    const submitBtn =
                        document.getElementById("forgotSubmitBtn");
                    const loader =
                        window.aiTomato && window.aiTomato.buttonLoader;
                    if (loader) {
                        loader.setLoading(submitBtn, "Sending reset link...");
                    } else if (submitBtn) {
                        submitBtn.disabled = true;
                    }
                });
            }
        </script>
    </body>
</html>
