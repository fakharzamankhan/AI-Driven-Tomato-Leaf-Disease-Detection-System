<div class="sidebar sidebar-panel d-flex flex-column">
    <div class="logo-wrap">
        <div class="logo-icon">
            <img
                src="{{ url_for('static', filename='img/logo.png') }}"
                alt="Logo"
                class="sidebar-logo-img"
            />
        </div>
        <span class="logo-text">AI Tomato Care</span>
    </div>
    <a
        href="{{ url_for('index') }}"
        class="{% if request.endpoint == 'index' %}active{% endif %}"
    >
        <i class="bi bi-house-door-fill"></i> HOME
    </a>
    {% if current_user.is_authenticated %}
    <a
        href="{{ url_for('dashboard_page') }}"
        class="{% if request.endpoint == 'dashboard_page' %}active{% endif %}"
    >
        <i class="bi bi-grid-1x2-fill"></i> DASHBOARD
    </a>
    <a
        href="{{ url_for('history_page') }}"
        class="{% if request.endpoint == 'history_page' %}active{% endif %}"
    >
        <i class="bi bi-clock-history"></i> HISTORY
    </a>
    {% else %}
    <a
        href="{{ url_for('login_page') }}"
        class="{% if request.endpoint == 'login_page' %}active{% endif %}"
    >
        <i class="bi bi-box-arrow-in-right"></i> LOGIN
    </a>
    {% endif %}
    <a
        href="{{ url_for('care_tips_page') }}"
        class="{% if request.endpoint == 'care_tips_page' %}active{% endif %}"
    >
        <i class="bi bi-lightbulb"></i> CARE TIPS
    </a>
    <a
        href="{{ url_for('about_page') }}"
        class="{% if request.endpoint == 'about_page' %}active{% endif %}"
    >
        <i class="bi bi-info-circle"></i> ABOUT
    </a>
    <a
        href="{{ url_for('faq_page') }}"
        class="{% if request.endpoint == 'faq_page' %}active{% endif %}"
    >
        <i class="bi bi-question-circle"></i> FAQ
    </a>
    <a
        href="{{ url_for('feedback_page') }}"
        class="{% if request.endpoint == 'feedback_page' %}active{% endif %}"
    >
        <i class="bi bi-stars"></i> FEEDBACK
    </a>
    {% if current_user.is_authenticated %}
    <a
        href="{{ url_for('contact_page') }}"
        class="{% if request.endpoint == 'contact_page' %}active{% endif %}"
    >
        <i class="bi bi-envelope"></i> CONTACT
    </a>
    {% endif %}
</div>
