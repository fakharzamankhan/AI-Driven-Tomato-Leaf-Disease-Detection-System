<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AI Tomato Care - Change Password</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}"
            rel="stylesheet"
        />
        <link
            href="{{ url_for('static', filename='vendor/bootstrap-icons/font/bootstrap-icons.min.css') }}"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/app.css') }}"
        />
    </head>
    <body>
        <button
            class="sidebar-toggle"
            id="sidebarToggle"
            type="button"
            aria-label="Toggle sidebar"
        >
            <i class="bi bi-list"></i>
        </button>
        <div class="container-fluid">
            <div class="row">
                {% include 'partials/sidebar.html' %}
                <div class="main-panel p-5">
                    {% include 'partials/top_nav.html' %}
                    <div class="mb-3">
                        <a
                            href="{{ url_for('account_page') }}"
                            class="btn btn-outline-teal btn-sm"
                        >
                            <i class="bi bi-arrow-left"></i> Back to Account
                        </a>
                    </div>
                    <div class="content-box mb-4">
                        <h2 class="fw-bold mb-2">
                            <i class="bi bi-key-fill me-2"></i>Change Password
                        </h2>
                        <p class="mb-0">
                            Create a new, strong password to keep your account
                            secure.
                        </p>
                    </div>

                    <div class="content-box mb-4">
                        <h4 class="section-title">
                            <i class="bi bi-key-fill"></i>Update Your Password
                        </h4>
                        <div
                            class="alert alert-success py-2"
                            id="passwordSuccess"
                            style="display: none"
                        ></div>
                        <div
                            class="alert alert-danger py-2"
                            id="passwordError"
                            style="display: none"
                        ></div>
                        <form id="passwordForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold small">
                                    Current password
                                </label>
                                <div class="input-group">
                                    <input
                                        type="password"
                                        class="form-control"
                                        id="currentPassword"
                                        autocomplete="current-password"
                                        required
                                    />
                                    <button
                                        class="btn btn-password-toggle password-toggle"
                                        type="button"
                                        data-target="currentPassword"
                                        aria-label="Show password"
                                    >
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">
                                    New password
                                </label>
                                <div class="input-group">
                                    <input
                                        type="password"
                                        class="form-control"
                                        id="newPassword"
                                        minlength="8"
                                        autocomplete="new-password"
                                        required
                                    />
                                    <button
                                        class="btn btn-password-toggle password-toggle"
                                        type="button"
                                        data-target="newPassword"
                                        aria-label="Show password"
                                    >
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <div class="form-text small">
                                    Minimum 8 characters.
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">
                                    Confirm new password
                                </label>
                                <div class="input-group">
                                    <input
                                        type="password"
                                        class="form-control"
                                        id="confirmPassword"
                                        minlength="8"
                                        autocomplete="new-password"
                                        required
                                    />
                                    <button
                                        class="btn btn-password-toggle password-toggle"
                                        type="button"
                                        data-target="confirmPassword"
                                        aria-label="Show password"
                                    >
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <button
                                type="submit"
                                class="btn btn-save"
                                id="passwordSaveBtn"
                            >
                                <i class="bi bi-check-circle me-1"></i> Save
                                changes
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/app.js') }}"></script>
        <script>
            // Change password flow
            document
                .getElementById("passwordForm")
                .addEventListener("submit", async function (e) {
                    e.preventDefault();
                    const successBox =
                        document.getElementById("passwordSuccess");
                    const errorBox = document.getElementById("passwordError");
                    successBox.style.display = "none";
                    errorBox.style.display = "none";

                    const currentPassword = document
                        .getElementById("currentPassword")
                        .value.trim();
                    const newPassword = document
                        .getElementById("newPassword")
                        .value.trim();
                    const confirmPassword = document
                        .getElementById("confirmPassword")
                        .value.trim();

                    if (!currentPassword || !newPassword || !confirmPassword) {
                        errorBox.textContent = "Please fill in all fields.";
                        errorBox.style.display = "block";
                        return;
                    }
                    if (newPassword.length < 8) {
                        errorBox.textContent =
                            "Password must be at least 8 characters.";
                        errorBox.style.display = "block";
                        return;
                    }

                    const btn = document.getElementById("passwordSaveBtn");
                    const loader =
                        window.aiTomato && window.aiTomato.buttonLoader;
                    if (loader) {
                        loader.setLoading(btn, "Saving changes...");
                    } else {
                        btn.disabled = true;
                    }
                    let redirecting = false;

                    try {
                        const res = await fetch(
                            "{{ url_for('api_change_password') }}",
                            {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    current_password: currentPassword,
                                    new_password: newPassword,
                                    confirm_password: confirmPassword,
                                }),
                            },
                        );
                        const data = await res.json();
                        if (res.ok && data.success) {
                            successBox.textContent =
                                data.message ||
                                "Password updated successfully.";
                            successBox.style.display = "block";
                            document.getElementById("currentPassword").value =
                                "";
                            document.getElementById("newPassword").value = "";
                            document.getElementById("confirmPassword").value =
                                "";
                            redirecting = true;
                            if (loader) {
                                loader.setRedirecting(btn, "Redirecting...");
                            }
                            setTimeout(function () {
                                window.location.href =
                                    "{{ url_for('account_page') }}";
                            }, 1200);
                            return;
                        } else {
                            errorBox.textContent =
                                data.message || "Failed to update password.";
                            errorBox.style.display = "block";
                        }
                    } catch (err) {
                        errorBox.textContent =
                            "Error updating password. Please try again.";
                        errorBox.style.display = "block";
                    }
                    if (!redirecting) {
                        if (loader) {
                            loader.reset(btn);
                        } else {
                            btn.disabled = false;
                        }
                    }
                });
        </script>
    </body>
</html>
